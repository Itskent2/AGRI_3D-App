[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Add these lines to enable the 8MB PSRAM
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I src/core
    -I src/drivers
    -I src/network
    -I src/routines
    ; Edge Impulse SDK include paths
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/edge-impulse-sdk"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/edge-impulse-sdk/classifier"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/edge-impulse-sdk/dsp"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/edge-impulse-sdk/tensorflow"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/edge-impulse-sdk/third_party"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/model-parameters"
    -I "src/AI Repository/weed-detection-cpp-mcu-v8-impulse-#2/tflite-model"
    -DEI_PORTING_ESPRESSIF=1
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    links2004/WebSockets @ ^2.4.1
