[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM7
upload_speed = 460800

; ── ESP32-S3 PSRAM & USB ────────────────────────────────────────────────────
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; ── Build Flags ──────────────────────────────────────────────────────────────
build_flags =
    ; ── Hardware ─────────────────────────────────────────────────────────────
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; ── Project include paths ─────────────────────────────────────────────────
    -I src/core
    -I src/drivers
    -I src/network
    -I src/routines
    -I src

    ; ── Edge Impulse SDK include paths ────────────────────────────────────────
    ; Root of src/ so that #include "edge-impulse-sdk/..." resolves
    -I src
    ; Model-specific parameter headers (model_metadata.h, model_variables.h)
    -I src/model-parameters
    ; Compiled TFLite inference graph header
    -I src/tflite-model

    ; ── Edge Impulse Required Defines ────────────────────────────────────────
    ; Selects the Espressif porting layer (timing, debug_log, memory helpers)
    -DEI_PORTING_ESPRESSIF=1
    ; Disable dynamic allocation in TFLite Micro (required for bare-metal/RTOS)
    -DTF_LITE_STATIC_MEMORY=1
    ; Keep float filterbank (better accuracy, sufficient RAM on S3 w/ PSRAM)
    -DEIDSP_QUANTIZE_FILTERBANK=0

    ; ── Suppress known-harmless EI SDK compiler warnings ────────────────────
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-sign-compare
    -Wno-missing-field-initializers

; ── Source Filtering ─────────────────────────────────────────────────────────
; Since we moved EI SDK into src/, PIO's default recursive build will find it.
; We just need to exclude any platform-specific folders we DON'T want.
build_src_filter =
    +<*>
    -<edge-impulse-sdk/porting/arduino>
    -<edge-impulse-sdk/porting/mbed>
    -<edge-impulse-sdk/porting/posix>
    -<edge-impulse-sdk/porting/silabs>
    -<edge-impulse-sdk/porting/stm32>
    -<edge-impulse-sdk/porting/ti>
    +<edge-impulse-sdk/porting/espressif/*.cpp>

; ── Dependencies ─────────────────────────────────────────────────────────────
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    links2004/WebSockets @ ^2.4.1

[env:esp32cam]
platform = espressif32@6.5.0
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 460800

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -I src/core
    -I src/drivers
    -I src/network
    -I src/routines
    -I src
    -I src/model-parameters
    -I src/tflite-model
    -DEI_PORTING_ESPRESSIF=1
    -DTF_LITE_STATIC_MEMORY=1
    -DEIDSP_QUANTIZE_FILTERBANK=0
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-sign-compare
    -Wno-missing-field-initializers

build_src_filter =
    +<*>
    -<edge-impulse-sdk/porting/arduino>
    -<edge-impulse-sdk/porting/mbed>
    -<edge-impulse-sdk/porting/posix>
    -<edge-impulse-sdk/porting/silabs>
    -<edge-impulse-sdk/porting/stm32>
    -<edge-impulse-sdk/porting/ti>
    +<edge-impulse-sdk/porting/espressif/*.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    links2004/WebSockets @ ^2.4.1
