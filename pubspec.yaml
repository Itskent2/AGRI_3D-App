name: farmbot_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  shared_preferences: ^2.5.4
  flutter_riverpod: ^3.3.1
  provider: ^6.1.5+1
  lucide_icons: ^0.257.0
  http: ^1.6.0
  intl: ^0.20.2
  permission_handler: ^12.0.1
  flutter_spinkit: ^5.2.2
  shimmer: ^3.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: assets/app_agri.png
  adaptive_icon_background: "#19222B"
  adaptive_icon_foreground: assets/app_agri.png

flutter:
  uses-material-design: true

  assets:
    - assets/image.png